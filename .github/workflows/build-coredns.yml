name: Build CoreDNS Images for RISC-V and x86

on:
  workflow_dispatch:
    inputs:
      coredns_version:
        description: 'CoreDNS version (e.g., v1.12.0)'
        required: false
        default: 'latest'
  schedule:
    - cron: "0 0 13 * *"

env:
  REGISTRY: ghcr.io

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      coredns_version: ${{ steps.versions.outputs.coredns_version }}
      coredns_tag: ${{ steps.versions.outputs.coredns_tag }}
      image_repo: ${{ steps.versions.outputs.image_repo }}
    steps:
      - name: Get latest versions
        id: versions
        run: |
          if [ "${{ github.event.inputs.coredns_version }}" = "latest" ] || [ -z "${{ github.event.inputs.coredns_version }}" ]; then
            COREDNS_VERSION=$(curl -s https://api.github.com/repos/coredns/coredns/releases/latest | jq -r '.tag_name')
          else
            COREDNS_VERSION="${{ github.event.inputs.coredns_version }}"
          fi

          COREDNS_TAG="${COREDNS_VERSION#v}"

          # Lowercase the repo owner — GHCR requires all image names to be lowercase
          IMAGE_REPO="ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"

          echo "coredns_version=$COREDNS_VERSION" >> "$GITHUB_OUTPUT"
          echo "coredns_tag=$COREDNS_TAG" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

          echo "Building CoreDNS: $COREDNS_VERSION"

  build-coredns-x86:
    needs: get-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone CoreDNS repository
        run: |
          rm -rf coredns
          git clone --depth=1 \
            --branch "${{ needs.get-versions.outputs.coredns_version }}" \
            https://github.com/coredns/coredns.git

      - name: Build and push CoreDNS for x86_64
        run: |
          cd coredns
          make

          mkdir -p /tmp/coredns-build
          cp coredns /tmp/coredns-build/

          cat > /tmp/coredns-build/Dockerfile << 'EOF'
          FROM debian:trixie-slim
          RUN apt-get update && \
              apt-get install -y ca-certificates && \
              rm -rf /var/lib/apt/lists/*
          COPY coredns /coredns
          RUN chmod +x /coredns
          EXPOSE 53 53/udp
          ENTRYPOINT ["/coredns"]
          EOF

          cd /tmp/coredns-build
          docker build \
            --tag "${{ needs.get-versions.outputs.image_repo }}/coredns:${{ needs.get-versions.outputs.coredns_tag }}-amd64" \
            --tag "${{ needs.get-versions.outputs.image_repo }}/coredns:latest-amd64" \
            .

          docker push "${{ needs.get-versions.outputs.image_repo }}/coredns:${{ needs.get-versions.outputs.coredns_tag }}-amd64"
          docker push "${{ needs.get-versions.outputs.image_repo }}/coredns:latest-amd64"

  build-coredns-riscv:
    needs: get-versions
    runs-on: RISCV64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Setup Go
        run: |
          sudo apt-get update && sudo apt-get install -y golang

      - name: Clean workspace with elevated permissions
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Clone CoreDNS repository
        run: |
          git clone --depth=1 \
            --branch "${{ needs.get-versions.outputs.coredns_version }}" \
            https://github.com/coredns/coredns.git \
            "$GITHUB_WORKSPACE/coredns"

      - name: Build and push CoreDNS for RISC-V
        run: |
          cd "$GITHUB_WORKSPACE/coredns"

          # Native build on riscv64 — no GOARCH flag needed
          make

          mkdir -p /tmp/coredns-build
          cp coredns /tmp/coredns-build/

          cat > /tmp/coredns-build/Dockerfile << 'EOF'
          FROM riscv64/debian:trixie-slim
          RUN apt-get update && \
              apt-get install -y ca-certificates && \
              rm -rf /var/lib/apt/lists/*
          COPY coredns /coredns
          RUN chmod +x /coredns
          EXPOSE 53 53/udp
          ENTRYPOINT ["/coredns"]
          EOF

          cd /tmp/coredns-build
          docker build \
            --tag "${{ needs.get-versions.outputs.image_repo }}/coredns:${{ needs.get-versions.outputs.coredns_tag }}-riscv64" \
            --tag "${{ needs.get-versions.outputs.image_repo }}/coredns:latest-riscv64" \
            .

          docker push "${{ needs.get-versions.outputs.image_repo }}/coredns:${{ needs.get-versions.outputs.coredns_tag }}-riscv64"
          docker push "${{ needs.get-versions.outputs.image_repo }}/coredns:latest-riscv64"

  create-manifests:
    needs: [get-versions, build-coredns-x86, build-coredns-riscv]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create CoreDNS multi-arch manifest
        run: |
          IMAGE_REPO="${{ needs.get-versions.outputs.image_repo }}"
          COREDNS_TAG="${{ needs.get-versions.outputs.coredns_tag }}"

          docker manifest rm "${IMAGE_REPO}/coredns:${COREDNS_TAG}" 2>/dev/null || true
          docker manifest rm "${IMAGE_REPO}/coredns:latest" 2>/dev/null || true

          docker manifest create "${IMAGE_REPO}/coredns:${COREDNS_TAG}" \
            "${IMAGE_REPO}/coredns:${COREDNS_TAG}-amd64" \
            "${IMAGE_REPO}/coredns:${COREDNS_TAG}-riscv64"
          docker manifest push "${IMAGE_REPO}/coredns:${COREDNS_TAG}"

          docker manifest create "${IMAGE_REPO}/coredns:latest" \
            "${IMAGE_REPO}/coredns:latest-amd64" \
            "${IMAGE_REPO}/coredns:latest-riscv64"
          docker manifest push "${IMAGE_REPO}/coredns:latest"
