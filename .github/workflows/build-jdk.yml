# Overlay for OpenJDK. Common scaffolding lives in _build-package.yaml.
name: Build OpenJDK for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: OpenJDK RISC-V
      setup-script: |
        set -eux
        export DEBIAN_FRONTEND=noninteractive
        sudo apt remove openjdk-* -y || true
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf make zip unzip file pkg-config \
          libx11-dev libxext-dev libxrender-dev libxrandr-dev \
          libxtst-dev libxt-dev libcups2-dev libfontconfig1-dev \
          libasound2-dev libffi-dev libfreetype6-dev libpng-dev \
          libjpeg-dev ca-certificates locales wget curl git python3 \
          gawk pandoc xsltproc gnutls-bin openjdk-25-jdk tree
        BOOT_JAVA_HOME=$(dirname "$(dirname "$(readlink -f "$(which javac)")")")
        echo "BOOT_JAVA_HOME=$BOOT_JAVA_HOME" >> "$GITHUB_ENV"
      build-script: |
        set -eux
        git config --global http.version HTTP/2
        git config --global http.postBuffer 1048576000

        rm -rf "$GITHUB_WORKSPACE/jdk"
        git clone --depth=1 --no-tags https://github.com/openjdk/jdk.git "$GITHUB_WORKSPACE/jdk"
        cd "$GITHUB_WORKSPACE/jdk"

        git fetch --tags --depth=1
        LATEST_TAG=$(git tag -l "jdk*" | sort -V | tail -n 1)
        echo "Checking out $LATEST_TAG"
        git fetch --depth=1 origin tag "$LATEST_TAG"
        git checkout FETCH_HEAD

        bash configure
        make JOBS=$(nproc) images

        "$GITHUB_WORKSPACE/jdk/build/linux-riscv64-server-release/images/jdk/bin/java" --version

        JDK_VERSION=$("$GITHUB_WORKSPACE/jdk/build/linux-riscv64-server-release/images/jdk/bin/java" --version | head -n1 | awk '{print $2}')
        echo "Detected built JDK version: $JDK_VERSION"

        ASSET_NAME="openjdk-${JDK_VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" \
          -C "$GITHUB_WORKSPACE/jdk/build/linux-riscv64-server-release/images" jdk

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
      trigger-pages: true
