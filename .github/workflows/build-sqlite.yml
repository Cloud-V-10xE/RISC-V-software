# Overlay for SQLite. Common scaffolding lives in _build-package.yaml.
name: Build SQLite for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: SQLite RISC-V
      apt-packages: build-essential wget tcl-dev libreadline-dev zlib1g-dev
      build-script: |
        set -eux
        # SQLite doesn't use GitHub releases — fetch from their download page
        TARBALL=$(curl -s "https://www.sqlite.org/download.html" \
          | grep -o 'sqlite-autoconf-[0-9]*\.tar\.gz' \
          | head -n1)
        # Extract numeric version e.g. 3460000 -> 3.46.0
        NUMVER=$(echo "$TARBALL" | grep -o '[0-9]*' | head -n1)
        MAJOR=$(echo $NUMVER | cut -c1)
        MINOR=$(echo $NUMVER | cut -c2-3 | sed 's/^0//')
        PATCH=$(echo $NUMVER | cut -c4-5 | sed 's/^0//')
        VERSION="${MAJOR}.${MINOR}.${PATCH}"
        YEAR=$(curl -s "https://www.sqlite.org/download.html" \
          | grep -o '20[0-9][0-9]/sqlite-autoconf' | head -n1 | cut -c1-4)
        DOWNLOAD_URL="https://www.sqlite.org/${YEAR}/${TARBALL}"
        echo "Latest SQLite: $VERSION ($TARBALL)"

        cd "$GITHUB_WORKSPACE"
        wget -q "$DOWNLOAD_URL"
        tar -xzf "$TARBALL"
        SRCDIR=$(basename "$TARBALL" .tar.gz)

        cd "$SRCDIR"
        ./configure \
          --prefix="$GITHUB_WORKSPACE/sqlite-install" \
          --enable-readline \
          --enable-fts5
        make -j$(nproc)
        make install

        "$GITHUB_WORKSPACE/sqlite-install/bin/sqlite3" --version

        ASSET_NAME="sqlite-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/sqlite-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
