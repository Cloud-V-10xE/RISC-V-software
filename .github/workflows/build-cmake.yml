# Overlay for CMake. Common scaffolding lives in _build-package.yaml.
name: Build CMake for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 2 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: CMake RISC-V
      apt-packages: build-essential git wget libssl-dev libcurl4-openssl-dev zlib1g-dev python3 jq
      build-script: |
        set -eux
        LATEST=$(curl -s https://api.github.com/repos/Kitware/CMake/releases/latest \
          | jq -r '.tag_name')
        VERSION="${LATEST#v}"
        echo "Latest CMake: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/Kitware/CMake.git \
          "$GITHUB_WORKSPACE/cmake-src"

        cd "$GITHUB_WORKSPACE/cmake-src"
        # Bootstrap CMake using its own bootstrap script — no CMake needed
        ./bootstrap \
          --prefix="$GITHUB_WORKSPACE/cmake-install" \
          --parallel=$(nproc)
        make -j$(nproc)
        make install

        "$GITHUB_WORKSPACE/cmake-install/bin/cmake" --version

        ASSET_NAME="cmake-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/cmake-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
      trigger-pages: true
