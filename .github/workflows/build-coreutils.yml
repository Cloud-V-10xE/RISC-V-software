# Overlay for coreutils. Common scaffolding lives in _build-package.yaml.
name: Build coreutils for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: coreutils RISC-V
      apt-packages: >-
        build-essential libatomic1 flex bison make git autoconf automake
        gettext autopoint gperf texinfo wget python3
      setup-script: |
        set -eux
        mkdir -p "$GITHUB_WORKSPACE/installed_binaries"
      build-script: |
        set -eux
        git config --global http.postBuffer 524288000
        git config --global http.maxRequests 2
        git config --global core.compression 0

        rm -rf "$GITHUB_WORKSPACE/coreutils"
        git clone --depth=1 --no-tags https://github.com/coreutils/coreutils.git "$GITHUB_WORKSPACE/coreutils"
        cd "$GITHUB_WORKSPACE/coreutils"

        git fetch --tags --depth=1
        git submodule update --recursive --remote
        LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n 1)
        echo "Checking out $LATEST_TAG"
        git fetch --depth=1 origin tag "$LATEST_TAG"
        git checkout FETCH_HEAD

        git config submodule.gnulib.url https://github.com/coreutils/gnulib.git
        ./bootstrap
        mkdir -p build
        cd build
        ../configure --prefix="$GITHUB_WORKSPACE/installed_binaries"
        make -j$(nproc)
        make install

        "$GITHUB_WORKSPACE/installed_binaries/bin/ls" --version

        COREUTILS_VERSION=$("$GITHUB_WORKSPACE/installed_binaries/bin/ls" --version | head -n1 | awk '{print $4}')
        ASSET_NAME="coreutils-${COREUTILS_VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/installed_binaries" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
      trigger-pages: true
