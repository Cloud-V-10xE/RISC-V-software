# Overlay for Protobuf. Common scaffolding lives in _build-package.yaml.
name: Build Protobuf for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: Protobuf RISC-V
      apt-packages: build-essential git jq cmake ninja-build zlib1g-dev
      build-script: |
        set -eux
        # Protobuf v27+ removed abseil as a submodule and switched to
        # CMake FetchContent which requires network at configure time.
        # The self-hosted runner blocks outbound CMake downloads so we
        # pin to the latest v26.x which still bundles abseil as a submodule.
        LATEST=$(curl -s "https://api.github.com/repos/protocolbuffers/protobuf/releases?per_page=100" \
          | jq -r '[.[] | select(.prerelease == false) | select(.tag_name | startswith("v26."))] | .[0].tag_name')
        if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
          LATEST=$(curl -s "https://api.github.com/repos/protocolbuffers/protobuf/releases?per_page=100" \
            | jq -r '[.[] | select(.prerelease == false) | select(.tag_name | startswith("v25."))] | .[0].tag_name')
        fi
        VERSION="${LATEST#v}"
        echo "Building Protobuf: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/protocolbuffers/protobuf.git \
          "$GITHUB_WORKSPACE/protobuf-src"
        cd "$GITHUB_WORKSPACE/protobuf-src"
        # Init all submodules recursively — submodule structure varies
        # between versions so we let git handle it rather than naming
        # specific paths which may not exist in newer releases
        git submodule update --init --recursive --depth=1

        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/protobuf-install" \
          -DCMAKE_CXX_STANDARD=17 \
          -DABSL_PROPAGATE_CXX_STD=ON \
          -Dprotobuf_BUILD_TESTS=OFF \
          -G Ninja
        cmake --build build --parallel $(nproc)
        cmake --install build

        "$GITHUB_WORKSPACE/protobuf-install/bin/protoc" --version

        ASSET_NAME="protobuf-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/protobuf-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
