# Overlay for Helm. Common scaffolding lives in _build-package.yaml.
name: Build Helm for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: Helm RISC-V
      apt-packages: build-essential git golang jq
      build-script: |
        set -eux
        LATEST=$(curl -s https://api.github.com/repos/helm/helm/releases/latest \
          | jq -r '.tag_name')
        VERSION="${LATEST#v}"
        echo "Latest Helm: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/helm/helm.git \
          "$GITHUB_WORKSPACE/helm-src"

        cd "$GITHUB_WORKSPACE/helm-src"
        # Helm uses make to build — produces a single binary
        make build-cross TARGETS=linux/riscv64
        mkdir -p "$GITHUB_WORKSPACE/helm-install/bin"
        cp "_dist/linux-riscv64/helm" "$GITHUB_WORKSPACE/helm-install/bin/helm"

        "$GITHUB_WORKSPACE/helm-install/bin/helm" version --short

        ASSET_NAME="helm-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/helm-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
