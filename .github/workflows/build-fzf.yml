# Overlay for fzf. Common scaffolding lives in _build-package.yaml.
name: Build fzf for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: fzf RISC-V
      apt-packages: build-essential git jq golang
      build-script: |
        set -eux
        LATEST=$(curl -s https://api.github.com/repos/junegunn/fzf/releases/latest \
          | jq -r '.tag_name')
        VERSION="${LATEST#v}"
        echo "Latest fzf: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/junegunn/fzf.git \
          "$GITHUB_WORKSPACE/fzf-src"

        cd "$GITHUB_WORKSPACE/fzf-src"
        # fzf uses a simple Makefile — produces a single binary
        make
        mkdir -p "$GITHUB_WORKSPACE/fzf-install/bin"
        # Makefile outputs to target/fzf-linux_riscv64 on riscv64
        cp target/fzf-linux_riscv64 "$GITHUB_WORKSPACE/fzf-install/bin/fzf"

        "$GITHUB_WORKSPACE/fzf-install/bin/fzf" --version

        ASSET_NAME="fzf-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/fzf-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
