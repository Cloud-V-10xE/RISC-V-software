# Overlay for Python. Common scaffolding lives in _build-package.yaml.
name: Build Python for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: Python RISC-V
      apt-packages: >-
        build-essential git wget jq libssl-dev zlib1g-dev libbz2-dev
        libreadline-dev libsqlite3-dev libncurses5-dev libncursesw5-dev
        libffi-dev liblzma-dev uuid-dev libgdbm-dev tk-dev
      build-script: |
        set -eux
        # Use git tags API — more reliable than releases API for finding
        # specific version branches when newer major versions are active.
        # Fetches tags matching v3.13.* sorted by version, picks latest.
        LATEST=$(curl -s "https://api.github.com/repos/python/cpython/git/refs/tags" \
          | jq -r '[.[] | .ref | ltrimstr("refs/tags/") | select(startswith("v3.13."))] | last')
        VERSION="${LATEST#v}"
        echo "Latest Python: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/python/cpython.git \
          "$GITHUB_WORKSPACE/cpython"

        cd "$GITHUB_WORKSPACE/cpython"
        ./configure \
          --prefix="$GITHUB_WORKSPACE/python-install" \
          --enable-optimizations \
          --with-ensurepip=install \
          --enable-shared \
          LDFLAGS="-Wl,-rpath,$GITHUB_WORKSPACE/python-install/lib"
        make -j$(nproc)
        make install

        "$GITHUB_WORKSPACE/python-install/bin/python3" --version
        "$GITHUB_WORKSPACE/python-install/bin/pip3" --version

        ASSET_NAME="python-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/python-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
