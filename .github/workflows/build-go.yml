# Overlay for Go. Common scaffolding lives in _build-package.yaml.
name: Build Go for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: Go RISC-V
      apt-packages: build-essential git autoconf automake wget make python3
      setup-script: |
        set -eux
        # Go 1.25+ requires >= 1.24.6 to bootstrap. apt ships 1.22.2 which
        # is too old. We install 1.24.6 from Google's official riscv64 release
        # into /usr/local/go-bootstrap to avoid overwriting apt's Go.
        # GOROOT_BOOTSTRAP is then set explicitly in the build-script.
        wget -q https://go.dev/dl/go1.24.6.linux-riscv64.tar.gz
        sudo mkdir -p /usr/local/go-bootstrap
        sudo tar -C /usr/local/go-bootstrap --strip-components=1 \
          -xzf go1.24.6.linux-riscv64.tar.gz
        /usr/local/go-bootstrap/bin/go version
      build-script: |
        set -eux
        git config --global http.version HTTP/2
        git config --global http.postBuffer 1048576000

        rm -rf "$GITHUB_WORKSPACE/go"
        git clone --depth=1 --no-tags https://go.googlesource.com/go "$GITHUB_WORKSPACE/go"
        cd "$GITHUB_WORKSPACE/go"

        git fetch --tags --depth=1
        LATEST_TAG=$(git tag -l "go1.*" | grep -v "rc\|beta\|alpha" | sort -V | tail -n 1)
        echo "Checking out $LATEST_TAG"
        git fetch --depth=1 origin tag "$LATEST_TAG"
        git checkout FETCH_HEAD

        cd "$GITHUB_WORKSPACE/go/src"
        # Point explicitly to our bootstrap Go — avoids using apt's older version
        export GOROOT_BOOTSTRAP=/usr/local/go-bootstrap
        export GOMAXPROCS=$(nproc)
        ./all.bash

        "$GITHUB_WORKSPACE/go/bin/go" version

        GO_VERSION=$("$GITHUB_WORKSPACE/go/bin/go" version | awk '{print substr($3,3)}')
        ASSET_NAME="golang-${GO_VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE" go

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
