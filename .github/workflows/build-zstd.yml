# Overlay for Zstd. Common scaffolding lives in _build-package.yaml.
name: Build Zstd for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 8 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: Zstd RISC-V
      apt-packages: build-essential git jq cmake ninja-build
      build-script: |
        set -eux
        LATEST=$(curl -s https://api.github.com/repos/facebook/zstd/releases/latest \
          | jq -r '.tag_name')
        VERSION="${LATEST#v}"
        echo "Latest Zstd: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/facebook/zstd.git \
          "$GITHUB_WORKSPACE/zstd-src"

        cd "$GITHUB_WORKSPACE/zstd-src"
        make -j$(nproc) PREFIX="$GITHUB_WORKSPACE/zstd-install"
        make install PREFIX="$GITHUB_WORKSPACE/zstd-install"

        "$GITHUB_WORKSPACE/zstd-install/bin/zstd" --version

        ASSET_NAME="zstd-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/zstd-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
      trigger-pages: true
