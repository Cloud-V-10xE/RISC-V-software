# Overlay for gRPC. Common scaffolding lives in _build-package.yaml.
name: Build gRPC for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: gRPC RISC-V
      apt-packages: >-
        build-essential git jq cmake ninja-build libssl-dev zlib1g-dev
        libabsl-dev libre2-dev libc-ares-dev
      build-script: |
        set -eux
        LATEST=$(curl -s https://api.github.com/repos/grpc/grpc/releases/latest \
          | jq -r '.tag_name')
        VERSION="${LATEST#v}"
        echo "Latest gRPC: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/grpc/grpc.git \
          "$GITHUB_WORKSPACE/grpc-src"
        cd "$GITHUB_WORKSPACE/grpc-src"
        # Initialize top-level submodules only — nested submodule init
        # (e.g. protobuf's own abseil) must be done separately with cd
        git submodule update --init --depth=1 \
          third_party/abseil-cpp \
          third_party/protobuf \
          third_party/re2 \
          third_party/boringssl-with-bazel \
          third_party/cares/cares
        # Now init protobuf's nested abseil from within its directory
        cd "$GITHUB_WORKSPACE/grpc-src/third_party/protobuf"
        git submodule update --init --depth=1 third_party/abseil-cpp \
          2>/dev/null || true
        # Also init utf8_range which protobuf needs
        git submodule update --init --depth=1 third_party/utf8_range \
          2>/dev/null || true

        cd "$GITHUB_WORKSPACE/grpc-src"
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/grpc-install" \
          -DCMAKE_CXX_STANDARD=17 \
          -DgRPC_INSTALL=ON \
          -DgRPC_BUILD_TESTS=OFF \
          -DgRPC_ABSL_PROVIDER=module \
          -DgRPC_PROTOBUF_PROVIDER=module \
          -DgRPC_RE2_PROVIDER=module \
          -DgRPC_SSL_PROVIDER=package \
          -DgRPC_ZLIB_PROVIDER=package \
          -DgRPC_CARES_PROVIDER=package \
          -G Ninja
        cmake --build build --parallel $(nproc)
        cmake --install build

        "$GITHUB_WORKSPACE/grpc-install/bin/grpc_cpp_plugin" --version 2>&1 || \
          ls "$GITHUB_WORKSPACE/grpc-install/bin/"

        ASSET_NAME="grpc-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/grpc-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
