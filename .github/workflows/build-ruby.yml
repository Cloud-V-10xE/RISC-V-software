# Overlay for Ruby. Common scaffolding lives in _build-package.yaml.
name: Build Ruby for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: Ruby RISC-V
      apt-packages: >-
        build-essential git wget jq libssl-dev libreadline-dev zlib1g-dev
        libyaml-dev libgdbm-dev libncurses5-dev libffi-dev autoconf bison ruby
      build-script: |
        set -eux
        LATEST=$(curl -s https://api.github.com/repos/ruby/ruby/releases \
          | jq -r '[.[] | select(.prerelease == false)] | .[0].tag_name')
        # Ruby tags look like v3_4_1 — convert to v3.4.1
        TAG_DOT=$(echo "$LATEST" | sed 's/_/./g')
        VERSION="${TAG_DOT#v}"
        echo "Latest Ruby: $VERSION"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/ruby/ruby.git \
          "$GITHUB_WORKSPACE/ruby-src"

        cd "$GITHUB_WORKSPACE/ruby-src"
        autoreconf -fi
        ./configure \
          --prefix="$GITHUB_WORKSPACE/ruby-install" \
          --enable-shared \
          --disable-install-doc \
          --with-baseruby=$(which ruby)

        # Replace downloader.rb with a stub that creates empty placeholder
        # files instead of downloading from rubygems.org (unreachable on the
        # self-hosted runner). Written via base64 to avoid YAML quoting issues.
        printf '%s' \
          'require "fileutils"
        dir = "."
        i = 0
        while i < ARGV.length
          if ARGV[i] == "-d" && ARGV[i+1]
            dir = ARGV[i+1]; i += 2
          else
            i += 1
          end
        end
        ARGV.each do |arg|
          next if arg.start_with?("-")
          gem_file = File.join(dir, arg.end_with?(".gem") ? arg : "#{arg}.gem")
          FileUtils.mkdir_p(File.dirname(gem_file))
          FileUtils.touch(gem_file)
        end
        ' > tool/downloader.rb

        mkdir -p gems
        make -j$(nproc)
        make install

        "$GITHUB_WORKSPACE/ruby-install/bin/ruby" --version
        "$GITHUB_WORKSPACE/ruby-install/bin/gem" --version

        ASSET_NAME="ruby-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/ruby-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
