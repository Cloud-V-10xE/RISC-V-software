# Overlay for Bazelisk. Common scaffolding lives in _build-package.yaml.
name: Build Bazelisk for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: Bazelisk RISC-V
      apt-packages: build-essential wget git curl file
      setup-script: |
        set -eux
        if command -v go &> /dev/null; then
          echo "Go already installed: $(go version)"
        else
          GO_VERSION="1.23.5"
          wget https://go.dev/dl/go${GO_VERSION}.linux-riscv64.tar.gz
          sudo tar -C /usr/local -xzf go${GO_VERSION}.linux-riscv64.tar.gz
          rm go${GO_VERSION}.linux-riscv64.tar.gz
        fi
        export PATH=$PATH:/usr/local/go/bin
        echo "/usr/local/go/bin" >> "$GITHUB_PATH"
        go version
      build-script: |
        set -eux
        git config --global http.postBuffer 524288000
        git config --global http.maxRequests 2
        git config --global core.compression 0

        rm -rf "$GITHUB_WORKSPACE/bazelisk" "$GITHUB_WORKSPACE/build_output"
        mkdir -p "$GITHUB_WORKSPACE/build_output"

        git clone --depth=1 --no-tags https://github.com/bazelbuild/bazelisk.git "$GITHUB_WORKSPACE/bazelisk"
        cd "$GITHUB_WORKSPACE/bazelisk"

        git fetch --tags --depth=1
        LATEST_TAG=$(git tag -l "v*" | grep -v "rc" | sort -V | tail -n 1)
        echo "Checking out $LATEST_TAG"
        git fetch --depth=1 origin tag "$LATEST_TAG"
        git checkout FETCH_HEAD

        CGO_ENABLED=0 GOOS=linux GOARCH=riscv64 go build -o bazelisk
        file bazelisk
        ./bazelisk version || echo "Bazelisk built successfully (version check may fail without network)"

        VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
        ASSET_NAME="bazelisk-${VERSION}-riscv64-linux"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        cp "$GITHUB_WORKSPACE/bazelisk/bazelisk" "$ASSET_PATH"
        chmod +x "$ASSET_PATH"

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
      trigger-pages: true
