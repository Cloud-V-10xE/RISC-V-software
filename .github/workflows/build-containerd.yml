# Overlay for containerd. Common scaffolding lives in _build-package.yaml.
name: Build containerd for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 11 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: containerd RISC-V
      apt-packages: build-essential git jq golang libseccomp-dev libbtrfs-dev
      build-script: |
        set -eux
        LATEST=$(curl -s https://api.github.com/repos/containerd/containerd/releases/latest \
          | jq -r '.tag_name')
        VERSION="${LATEST#v}"
        echo "Latest containerd: $LATEST"

        git clone --depth=1 \
          --branch "$LATEST" \
          https://github.com/containerd/containerd.git \
          "$GITHUB_WORKSPACE/containerd-src"

        cd "$GITHUB_WORKSPACE/containerd-src"
        make binaries
        mkdir -p "$GITHUB_WORKSPACE/containerd-install/bin"
        cp bin/* "$GITHUB_WORKSPACE/containerd-install/bin/"

        "$GITHUB_WORKSPACE/containerd-install/bin/containerd" --version

        ASSET_NAME="containerd-${VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/containerd-install" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
      trigger-pages: true
