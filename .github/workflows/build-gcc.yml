# Overlay for GCC. Common scaffolding lives in _build-package.yaml.
name: Build GCC for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    uses: ./.github/workflows/_build-package.yaml
    with:
      package-name: GCC RISC-V
      apt-packages: build-essential libatomic1 flex bison
      setup-script: |
        set -eux
        mkdir -p "$GITHUB_WORKSPACE/installed_binaries"
      build-script: |
        set -eux
        git config --global http.postBuffer 524288000
        git config --global http.maxRequests 2
        git config --global core.compression 0

        rm -rf "$GITHUB_WORKSPACE/gcc"
        git clone --depth=1 --no-tags git://gcc.gnu.org/git/gcc.git "$GITHUB_WORKSPACE/gcc"
        cd "$GITHUB_WORKSPACE/gcc"

        git fetch --tags --depth=1
        LATEST_TAG=$(git tag -l "releases/gcc*" | sort -V | tail -n 1)
        echo "Checking out $LATEST_TAG"
        git fetch --depth=1 origin tag "$LATEST_TAG"
        git checkout FETCH_HEAD

        ./contrib/download_prerequisites

        mkdir -p build
        cd build
        ../configure \
          --prefix="$GITHUB_WORKSPACE/installed_binaries" \
          --disable-werror \
          --disable-multilib
        make -j$(nproc)
        make install

        "$GITHUB_WORKSPACE/installed_binaries/bin/gcc" --version

        GCC_VERSION=$("$GITHUB_WORKSPACE/installed_binaries/bin/gcc" -dumpfullversion -dumpversion)
        ASSET_NAME="gcc-${GCC_VERSION}-riscv64-linux.tar.gz"
        ASSET_PATH="$GITHUB_WORKSPACE/${ASSET_NAME}"
        tar -czf "$ASSET_PATH" -C "$GITHUB_WORKSPACE/installed_binaries" .

        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
        echo "ASSET_PATH=$ASSET_PATH" >> "$GITHUB_ENV"
      trigger-pages: true
