name: Build .NET SDK for RISC-V

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: RISCV64
    env:
      OUTPUTDIR: ${{ github.workspace }}/output
    outputs:
      asset_name: ${{ steps.set-outputs.outputs.asset_name }}
      asset_path: ${{ steps.set-outputs.outputs.asset_path }}
      release_name: ${{ steps.set-outputs.outputs.release_name }}

    steps:
      - name: Clean workspace with elevated permissions
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget cmake ninja-build \
            clang llvm lld \
            libicu-dev libssl-dev libkrb5-dev \
            liblttng-ust-dev libcurl4-openssl-dev \
            zlib1g-dev libunwind-dev \
            build-essential gettext locales \
            python3 python3-pip

          # NodeSource does not support riscv64 — use Ubuntu repos instead
          sudo apt-get install -y nodejs npm

      - name: Clone dotnet/dotnet VMR
        # For .NET 9+, Microsoft merged all repos (runtime, aspnetcore, sdk, installer)
        # into the Virtual Monolithic Repository (VMR) at github.com/dotnet/dotnet.
        # The old multi-repo approach (separate runtime/aspnetcore/sdk/installer clones)
        # was the .NET 8 way and no longer works for .NET 9.
        run: |
          git clone --depth 1 -b v9.0.100 https://github.com/dotnet/dotnet "$GITHUB_WORKSPACE/dotnet"

      - name: Build .NET SDK
        run: |
          mkdir -p "${OUTPUTDIR}"
          cd "$GITHUB_WORKSPACE/dotnet"

          # Native build on riscv64 — no cross-compilation flags needed
          ./build.sh --clean-while-building

          # Copy final SDK tarball to output
          cp artifacts/assets/Release/dotnet-sdk-*-linux-riscv64.tar.gz "${OUTPUTDIR}/"

      - name: Set outputs
        id: set-outputs
        run: |
          ASSET_FILE=$(ls "${OUTPUTDIR}"/dotnet-sdk-*-linux-riscv64.tar.gz | head -n1)
          ASSET_NAME=$(basename "$ASSET_FILE")
          ASSET_PATH="${OUTPUTDIR}/${ASSET_NAME}"
          VERSION=$(echo "$ASSET_NAME" | grep -oP 'dotnet-sdk-\K[0-9]+\.[0-9]+\.[0-9]+')

          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "release_name=.NET SDK ${VERSION} RISC-V" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-outputs.outputs.asset_name }}
          path: ${{ steps.set-outputs.outputs.asset_path }}

      - name: Trigger Pages update
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: update-pages
